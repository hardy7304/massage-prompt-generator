<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>柔手整復 · 影片提示詞生成器</title>
<style>
  :root {
    --bg:       #0f0e0c;
    --surface:  #1a1814;
    --card:     #221f1a;
    --border:   #3a3530;
    --gold:     #c8a96e;
    --gold-dim: #8a7249;
    --warm:     #e8d5b0;
    --text:     #d4c9b5;
    --muted:    #9a8f7e;
    --accent:   #3d7a6e;
    --accent-l: #4f9e90;
    --red:      #8b3a3a;

    --r-sm: 6px;
    --r-md: 10px;
    --r-lg: 16px;

    --font: 'Noto Serif TC', Georgia, serif;
    --mono: 'JetBrains Mono', 'Fira Code', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── Header ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 1.5rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    background: var(--surface);
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .logo svg { flex-shrink: 0; }
  .logo-text h1 {
    font-size: 1.15rem;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.05em;
    line-height: 1.2;
  }
  .logo-text p {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.08em;
  }
  .badge {
    margin-left: auto;
    font-size: 0.65rem;
    background: rgba(200,169,110,0.12);
    color: var(--gold-dim);
    border: 1px solid rgba(200,169,110,0.2);
    padding: 0.25rem 0.6rem;
    border-radius: 20px;
    letter-spacing: 0.06em;
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    display: inline-block;
    margin-right: 0.3rem;
    transition: background 0.3s;
  }
  .status-dot.ok   { background: #4caf82; }
  .status-dot.err  { background: #c46060; }
  .status-label {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
  }

  /* ── Layout ── */
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
    display: grid;
    grid-template-columns: 1fr 400px;
    gap: 1.5rem;
    align-items: start;
  }
  @media (max-width: 820px) {
    .container { grid-template-columns: 1fr; }
  }

  /* ── Section Headings ── */
  .section-label {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── Quick Input ── */
  .quick-input-wrap {
    margin-bottom: 1.5rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 1.25rem;
  }
  .quick-input-wrap label {
    display: block;
    font-size: 0.75rem;
    color: var(--gold);
    letter-spacing: 0.08em;
    margin-bottom: 0.6rem;
  }
  .quick-input-wrap textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    color: var(--warm);
    font-family: var(--font);
    font-size: 0.9rem;
    padding: 0.75rem 1rem;
    resize: vertical;
    min-height: 70px;
    transition: border-color 0.2s;
    outline: none;
    line-height: 1.6;
  }
  .quick-input-wrap textarea:focus {
    border-color: var(--gold-dim);
  }
  .quick-input-wrap textarea::placeholder { color: var(--muted); }

  /* ── Dimension Grid ── */
  .dims-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }
  @media (max-width: 600px) {
    .dims-grid { grid-template-columns: 1fr; }
  }

  .dim-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 1rem 1.1rem;
    transition: border-color 0.2s;
  }
  .dim-card.has-selection {
    border-color: var(--gold-dim);
  }
  .dim-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.75rem;
  }
  .dim-icon { font-size: 1rem; }
  .dim-name {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--warm);
    letter-spacing: 0.04em;
  }
  .dim-count {
    margin-left: auto;
    font-size: 0.65rem;
    color: var(--text);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 0.15rem 0.45rem;
    border-radius: 20px;
  }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }
  .chip {
    font-size: 0.72rem;
    padding: 0.28rem 0.65rem;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
    line-height: 1.4;
  }
  .chip:hover {
    border-color: var(--gold-dim);
    color: var(--text);
  }
  .chip.selected {
    background: rgba(200,169,110,0.15);
    border-color: var(--gold);
    color: var(--gold);
  }

  /* ── Right Panel ── */
  .right-panel {
    position: sticky;
    top: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  /* Selection Summary */
  .summary-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 1.25rem;
  }
  .summary-list {
    display: flex;
    flex-direction: column;
    gap: 0.45rem;
  }
  .summary-row {
    display: flex;
    gap: 0.5rem;
    font-size: 0.76rem;
    align-items: flex-start;
  }
  .summary-row .dim-label {
    color: var(--text);
    min-width: 44px;
    flex-shrink: 0;
    padding-top: 0.05rem;
  }
  .summary-row .selected-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
  }
  .mini-chip {
    background: rgba(200,169,110,0.12);
    color: var(--gold);
    border-radius: 4px;
    padding: 0.1rem 0.4rem;
    font-size: 0.7rem;
  }
  .empty-chip {
    color: var(--muted);
    font-size: 0.7rem;
    font-style: italic;
  }

  /* Generate Button */
  .generate-btn {
    width: 100%;
    padding: 0.9rem;
    background: linear-gradient(135deg, #c8a96e 0%, #a0824e 100%);
    color: #0f0e0c;
    border: none;
    border-radius: var(--r-md);
    font-family: var(--font);
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
  }
  .generate-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .generate-btn:active { transform: translateY(0); }
  .generate-btn:disabled {
    background: var(--border);
    color: var(--muted);
    cursor: not-allowed;
    transform: none;
  }
  .generate-btn .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #0f0e0c;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  .generate-btn.loading .spinner { display: block; }
  .generate-btn.loading .btn-text { opacity: 0.7; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Clear Button */
  .clear-btn {
    width: 100%;
    padding: 0.5rem;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    color: var(--muted);
    font-family: var(--font);
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }
  .clear-btn:hover { border-color: var(--red); color: #c46060; }

  /* ── Output Card ── */
  .output-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    overflow: hidden;
    display: none;
  }
  .output-card.visible { display: block; }
  .output-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    flex: 1;
    padding: 0.6rem;
    background: none;
    border: none;
    color: var(--muted);
    font-family: var(--font);
    font-size: 0.72rem;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.15s;
    border-bottom: 2px solid transparent;
  }
  .tab-btn.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
    background: rgba(200,169,110,0.06);
  }
  .output-content {
    padding: 1.25rem;
    min-height: 120px;
  }
  .output-text {
    font-size: 0.82rem;
    line-height: 1.8;
    color: var(--warm);
    white-space: pre-wrap;
    font-family: var(--font);
  }
  .output-text .dim-line { color: var(--muted); }
  .output-text .dim-line strong { color: var(--gold); }
  .output-text .prompt-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--gold);
    padding: 0.75rem 1rem;
    border-radius: 0 var(--r-sm) var(--r-sm) 0;
    margin: 0.5rem 0;
    font-family: var(--font);
    font-size: 0.82rem;
    color: var(--warm);
    line-height: 1.7;
  }
  .cursor-blink {
    display: inline-block;
    width: 2px; height: 1em;
    background: var(--gold);
    animation: blink 1s step-end infinite;
    vertical-align: text-bottom;
    margin-left: 2px;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .copy-btn {
    width: 100%;
    padding: 0.55rem;
    margin-top: 0.75rem;
    background: rgba(200,169,110,0.08);
    border: 1px solid rgba(200,169,110,0.25);
    border-radius: var(--r-sm);
    color: var(--gold-dim);
    font-family: var(--font);
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }
  .copy-btn:hover { background: rgba(200,169,110,0.15); color: var(--gold); }
  .copy-btn.copied { color: var(--accent-l); border-color: var(--accent-l); }

  /* ── Tooltip ── */
  .tip {
    font-size: 0.68rem;
    color: var(--muted);
    text-align: center;
    padding: 0 1rem;
    line-height: 1.5;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">
    <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="柔手整復 Logo">
      <rect width="36" height="36" rx="8" fill="#1a1814"/>
      <!-- Hand symbol -->
      <path d="M18 8 C18 8 13 10 13 15 L13 22 C13 24.2 14.8 26 17 26 L19 26 C21.2 26 23 24.2 23 22 L23 15 C23 10 18 8 18 8Z" stroke="#c8a96e" stroke-width="1.2" fill="none" stroke-linejoin="round"/>
      <line x1="16" y1="14" x2="16" y2="22" stroke="#c8a96e" stroke-width="0.9" stroke-linecap="round"/>
      <line x1="18" y1="13" x2="18" y2="22" stroke="#c8a96e" stroke-width="0.9" stroke-linecap="round"/>
      <line x1="20" y1="14" x2="20" y2="22" stroke="#c8a96e" stroke-width="0.9" stroke-linecap="round"/>
      <!-- Acupoint dot -->
      <circle cx="25" cy="12" r="2" fill="#c8a96e" opacity="0.7"/>
      <circle cx="11" cy="11" r="1.5" fill="#c8a96e" opacity="0.4"/>
      <circle cx="27" cy="20" r="1" fill="#c8a96e" opacity="0.3"/>
    </svg>
    <div class="logo-text">
      <h1>柔手整復 · 影片提示詞生成器</h1>
      <p>MASSAGE THERAPY · VIDEO PROMPT BUILDER</p>
    </div>
  </div>
  <span class="badge">Google Flow / Veo</span>
  <span class="status-label" id="statusLabel">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">檢查中…</span>
  </span>
</header>

<div class="container">
  <!-- LEFT: Input Area -->
  <div class="left-panel">

    <!-- Quick Input -->
    <div class="quick-input-wrap">
      <label>⚡ 一句話描述（可選）</label>
      <textarea id="userInput" placeholder="例如：拍一支展現台南傳統整復師幫客戶舒緩肩頸的療程影片…"></textarea>
    </div>

    <!-- Dimensions -->
    <div class="section-label">選擇維度元素（可多選）</div>
    <div class="dims-grid" id="dimsGrid">
      <!-- Rendered by JS -->
    </div>

  </div>

  <!-- RIGHT: Summary + Output -->
  <div class="right-panel">

    <!-- Summary -->
    <div class="summary-card">
      <div class="section-label">已選組合</div>
      <div class="summary-list" id="summaryList"></div>
    </div>

    <!-- Generate -->
    <button class="generate-btn" id="generateBtn" onclick="generate()">
      <div class="spinner"></div>
      <span class="btn-text">✦ 生成完整提示詞</span>
    </button>
    <button class="clear-btn" onclick="clearAll()">清除所有選擇</button>
    <p class="tip">選擇 2–4 個維度可獲得最佳效果。維度越多越精準。</p>

    <!-- Output -->
    <div class="output-card" id="outputCard">
      <div class="output-tabs">
        <button class="tab-btn active" onclick="switchTab('full')" id="tab-full">完整輸出</button>
        <button class="tab-btn" onclick="switchTab('en')" id="tab-en">英文提示詞</button>
        <button class="tab-btn" onclick="switchTab('zh')" id="tab-zh">中文版本</button>
      </div>
      <div class="output-content">
        <div class="output-text" id="outputText"></div>
        <button class="copy-btn" id="copyBtn" onclick="copyOutput()">複製提示詞</button>
      </div>
    </div>

  </div>
</div>

<script>
// ── Data ──
const DIMENSIONS = [
  {
    id: 'role', icon: '👤', name: '角色',
    items: [
      '專業整復師（男）', '專業整復師（女）',
      '放鬆中的客戶（側躺）', '手部特寫（施術中）',
      '運動員尋求整復', '老人長輩療程'
    ]
  },
  {
    id: 'camera', icon: '🎥', name: '鏡頭',
    items: [
      '極近特寫手法', '側面跟拍療程',
      '俯視全景鳥瞰', '緩慢推近鏡頭',
      '客戶主觀視角POV', '固定機位長鏡頭'
    ]
  },
  {
    id: 'bg', icon: '🖼', name: '背景',
    items: [
      '日式禪風工作室', '現代醫療診所',
      '台南傳統街巷', '柔和戶外自然光',
      '溫暖居家臥室', '簡約白色空間'
    ]
  },
  {
    id: 'narrative', icon: '📝', name: '敘事',
    items: [
      '正在發生的療程', '痛苦解除故事弧線',
      '專家知識分享教學', '客戶見證訪談',
      '前後對比展示', '日常護理示範'
    ]
  },
  {
    id: 'style', icon: '🎨', name: '風格',
    items: [
      '電影級暖調', '自然記錄片風',
      '高對比內容創作', '復古底片質感',
      '極簡純白現代', '深夜療癒氛圍'
    ]
  },
  {
    id: 'angle', icon: '📐', name: '角度',
    items: [
      '正面對稱', '低角度仰拍',
      '45度斜側面', '俯角30度',
      '肩膀後方跟隨', '臉部局部特寫'
    ]
  },
  {
    id: 'speech', icon: '🗣', name: '說話',
    items: [
      '整復師穴位解說', '客戶真實見證',
      '旁白知識介紹', '無對白純視覺',
      '輕聲對話互動', '直播風格解說'
    ]
  },
  {
    id: 'subtitle', icon: '💬', name: '字幕',
    items: [
      '淡黃小標題字幕', '飛入動態字幕',
      '半透明深色字幕', '無字幕純視覺',
      '穴位名稱標示', '手寫風格字幕'
    ]
  }
];

// ── State ──
const selected = {};
DIMENSIONS.forEach(d => { selected[d.id] = []; });

let currentTab = 'full';
let fullOutput = '';
let enOutput = '';
let zhOutput = '';

// ── Render Dimensions ──
function renderDims() {
  const grid = document.getElementById('dimsGrid');
  grid.innerHTML = DIMENSIONS.map(dim => `
    <div class="dim-card" id="card-${dim.id}">
      <div class="dim-header">
        <span class="dim-icon">${dim.icon}</span>
        <span class="dim-name">${dim.name}</span>
        <span class="dim-count" id="count-${dim.id}">0/${dim.items.length}</span>
      </div>
      <div class="chips">
        ${dim.items.map(item => `
          <span class="chip" onclick="toggleChip('${dim.id}', '${item}', this)">${item}</span>
        `).join('')}
      </div>
    </div>
  `).join('');
  renderSummary();
}

function toggleChip(dimId, item, el) {
  const arr = selected[dimId];
  const idx = arr.indexOf(item);
  if (idx === -1) {
    arr.push(item);
    el.classList.add('selected');
  } else {
    arr.splice(idx, 1);
    el.classList.remove('selected');
  }
  updateCount(dimId);
  renderSummary();
}

function updateCount(dimId) {
  const n = selected[dimId].length;
  document.getElementById(`count-${dimId}`).textContent = `${n}/${DIMENSIONS.find(d=>d.id===dimId).items.length}`;
  document.getElementById(`card-${dimId}`).classList.toggle('has-selection', n > 0);
}

function renderSummary() {
  const list = document.getElementById('summaryList');
  list.innerHTML = DIMENSIONS.map(dim => {
    const items = selected[dim.id];
    return `
      <div class="summary-row">
        <span class="dim-label">${dim.icon} ${dim.name}</span>
        <div class="selected-chips">
          ${items.length > 0
            ? items.map(i => `<span class="mini-chip">${i}</span>`).join('')
            : `<span class="empty-chip">未選擇</span>`
          }
        </div>
      </div>
    `;
  }).join('');
}

function clearAll() {
  DIMENSIONS.forEach(d => { selected[d.id] = []; });
  document.querySelectorAll('.chip.selected').forEach(el => el.classList.remove('selected'));
  DIMENSIONS.forEach(d => {
    document.getElementById(`count-${d.id}`).textContent = `0/${d.items.length}`;
    document.getElementById(`card-${d.id}`).classList.remove('has-selection');
  });
  document.getElementById('userInput').value = '';
  renderSummary();
  document.getElementById('outputCard').classList.remove('visible');
  fullOutput = enOutput = zhOutput = '';
}

// ── Generate ──
async function generate() {
  const userInput = document.getElementById('userInput').value.trim();
  const hasSelection = Object.values(selected).some(arr => arr.length > 0);
  if (!hasSelection && !userInput) {
    alert('請至少輸入一句話或選擇一個維度元素');
    return;
  }

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.classList.add('loading');

  const outputCard = document.getElementById('outputCard');
  const outputText = document.getElementById('outputText');
  outputCard.classList.add('visible');
  outputText.innerHTML = '<span class="cursor-blink"></span>';
  fullOutput = '';

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ selections: selected, user_input: userInput })
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          const data = line.slice(6);
          if (data === '[DONE]') break;
          try {
            const { text } = JSON.parse(data);
            fullOutput += text;
            outputText.innerHTML = renderOutput(fullOutput) + '<span class="cursor-blink"></span>';
            outputText.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          } catch {}
        }
      }
    }

    // Final render without cursor
    outputText.innerHTML = renderOutput(fullOutput);
    parseOutputParts(fullOutput);
    switchTab(currentTab);

  } catch (err) {
    outputText.innerHTML = `<span style="color:#c46060">生成失敗：${err.message}</span>`;
  }

  btn.disabled = false;
  btn.classList.remove('loading');
}

function renderOutput(raw) {
  return raw
    .replace(/### (.*)/g, '<strong style="color:var(--gold);display:block;margin:0.8rem 0 0.4rem;">$1</strong>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/(角色|鏡頭|背景|敘事|風格|角度|說話|字幕)：/g, '<strong style="color:var(--gold-dim)">$1：</strong>')
    .replace(/\n/g, '<br>');
}

function parseOutputParts(raw) {
  // Extract English prompt
  const enMatch = raw.match(/### 完整提示詞（Google Flow 直接使用）\n([\s\S]*?)(?=###|$)/);
  enOutput = enMatch ? enMatch[1].trim() : '';
  // Extract Chinese
  const zhMatch = raw.match(/### 備用中文版本\n([\s\S]*?)(?=###|$)/);
  zhOutput = zhMatch ? zhMatch[1].trim() : '';
}

// ── Tabs ──
function switchTab(tab) {
  currentTab = tab;
  ['full', 'en', 'zh'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
  });
  const outputText = document.getElementById('outputText');
  if (!fullOutput) return;
  if (tab === 'full') {
    outputText.innerHTML = renderOutput(fullOutput);
  } else if (tab === 'en') {
    outputText.innerHTML = enOutput
      ? `<div class="prompt-block">${enOutput}</div>`
      : renderOutput(fullOutput);
  } else {
    outputText.innerHTML = zhOutput
      ? `<div class="prompt-block">${zhOutput}</div>`
      : renderOutput(fullOutput);
  }
}

// ── Copy ──
function copyOutput() {
  let text = '';
  if (currentTab === 'en') text = enOutput;
  else if (currentTab === 'zh') text = zhOutput;
  else text = fullOutput;

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ 已複製';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '複製提示詞';
      btn.classList.remove('copied');
    }, 2000);
  });
}

// ── Init ──
renderDims();

// ── Health Check ──
async function checkHealth() {
  try {
    const res = await fetch('/api/health');
    const data = await res.json();
    const dot  = document.getElementById('statusDot');
    const txt  = document.getElementById('statusText');
    if (data.provider && data.provider !== 'none') {
      dot.className = 'status-dot ok';
      const names = { anthropic: 'Claude', gemini: 'Gemini', openai: 'GPT' };
      txt.textContent = names[data.provider] || data.provider;
    } else {
      dot.className = 'status-dot err';
      txt.textContent = '未設定 API Key';
    }
  } catch(e) {
    document.getElementById('statusDot').className = 'status-dot err';
    document.getElementById('statusText').textContent = '離線';
  }
}
checkHealth();
